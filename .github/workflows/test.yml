name: CI

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Bootstrap pinned dependencies
        run: ./scripts/bootstrap.sh

      - name: Verify dependency integrity
        run: ./scripts/verify_dependencies.sh

      - name: Forge build
        run: forge build --sizes

      - name: Forge test
        run: forge test -vvv

